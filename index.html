<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D Tiles - 真实天空</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { overflow: hidden; background: #1f1f1f; }
      #container { width: 100vw; height: 100vh; }
    </style>
  </head>
  <body>
    <div id="container"></div>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.179.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.179.0/examples/jsm/",
          "3d-tiles-renderer": "https://cdn.jsdelivr.net/npm/3d-tiles-renderer@0.4.27/src/three/renderer/index.js",
          "3d-tiles-renderer/core": "https://cdn.jsdelivr.net/npm/3d-tiles-renderer@0.4.27/src/core/renderer/index.js"
        }
      }
    </script>

    <script type="module">
      import * as THREE from "three";
      import { OrbitControls } from "three/addons/controls/OrbitControls.js";
      import { TilesRenderer } from "3d-tiles-renderer";
      import { Sky } from "three/addons/objects/Sky.js";

      const container = document.getElementById("container");

      // ---------- 场景 ----------
      const scene = new THREE.Scene();
      scene.background = null; // 让 Sky 完全控制背景

      // ---------- 相机 ----------
      const camera = new THREE.PerspectiveCamera(
        75,
        window.innerWidth / window.innerHeight,
        0.1,
        10000
      );
      camera.position.set(0, 30, 30);

      // ---------- 渲染器 ----------
      const renderer = new THREE.WebGLRenderer({
        antialias: true,
        alpha: false,
        logarithmicDepthBuffer: false, // 关闭以避免冲突
      });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = 1.0;
      // 关键修复：清屏颜色设为完全透明，这样 Sky 才能显示出来
      renderer.setClearColor(0x000000, 0);
      container.appendChild(renderer.domElement);

      // ---------- 控制器 ----------
      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.minDistance = 1;
      controls.maxDistance = 500;

      // ============================================================
      // 1. 真实天空（使用 Three.js Sky 着色器）
      // ============================================================
      const sky = new Sky();
      sky.scale.setScalar(10000);
      // 使天空球从内部可见
      sky.material.side = THREE.BackSide;
      // 确保天空先渲染
      sky.renderOrder = -1;
      scene.add(sky);

      const skyUniforms = sky.material.uniforms;
      skyUniforms['turbidity'].value = 2;
      skyUniforms['rayleigh'].value = 1;
      skyUniforms['mieCoefficient'].value = 0.005;
      skyUniforms['mieDirectionalGradient'].value = 0.8;

      // 太阳位置（正午）
      const sun = new THREE.Vector3();
      const phi = THREE.MathUtils.degToRad(88);
      const theta = THREE.MathUtils.degToRad(180);
      sun.setFromSphericalCoords(1, phi, theta);
      skyUniforms['sunPosition'].value.copy(sun);

      // 环境光
      const ambientLight = new THREE.AmbientLight(0x404060, 0.4);
      scene.add(ambientLight);

      // 太阳光
      const sunLight = new THREE.DirectionalLight(0xffeedd, 1.8);
      sunLight.position.copy(sun.clone().multiplyScalar(300));
      scene.add(sunLight);

      // 补光
      const fillLight = new THREE.DirectionalLight(0x4488ff, 0.3);
      fillLight.position.set(-100, 50, -100);
      scene.add(fillLight);

      // ============================================================
      // 2. 立体云朵（使用 Sprite，轻量且稳定）
      // ============================================================
      function createCloudTexture() {
        const canvas = document.createElement('canvas');
        canvas.width = 256;
        canvas.height = 128;
        const ctx = canvas.getContext('2d');

        // 绘制多个半透明圆斑叠加形成云朵
        const centers = [
          [80, 50, 60, 35],
          [130, 40, 70, 40],
          [180, 55, 55, 30],
          [100, 70, 50, 25],
          [150, 70, 45, 25],
          [60, 65, 40, 20],
          [200, 70, 35, 18]
        ];
        centers.forEach(([cx, cy, rx, ry]) => {
          const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, rx);
          g.addColorStop(0, 'rgba(255,255,255,0.95)');
          g.addColorStop(0.3, 'rgba(255,255,255,0.8)');
          g.addColorStop(0.6, 'rgba(255,255,255,0.5)');
          g.addColorStop(0.8, 'rgba(255,255,255,0.2)');
          g.addColorStop(1, 'rgba(255,255,255,0)');
          ctx.fillStyle = g;
          ctx.beginPath();
          ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2);
          ctx.fill();
        });

        const texture = new THREE.CanvasTexture(canvas);
        texture.needsUpdate = true;
        return texture;
      }

      const cloudTexture = createCloudTexture();

      function createCloud(position, scale = 1) {
        const material = new THREE.SpriteMaterial({
          map: cloudTexture,
          transparent: true,
          opacity: 0.7,
          depthWrite: false,
          blending: THREE.NormalBlending,
        });
        const sprite = new THREE.Sprite(material);
        sprite.position.copy(position);
        sprite.scale.set(60 * scale, 30 * scale, 1);
        sprite.renderOrder = -1;
        return sprite;
      }

      // 随机生成云朵
      const cloudPositions = [];
      for (let i = 0; i < 45; i++) {
        const radius = 80 + Math.random() * 150;
        const angle = Math.random() * Math.PI * 2;
        const x = Math.cos(angle) * radius;
        const z = Math.sin(angle) * radius;
        const y = 25 + Math.random() * 35;
        const scale = 0.6 + Math.random() * 1.2;
        const cloud = createCloud(new THREE.Vector3(x, y, z), scale);
        scene.add(cloud);
        cloudPositions.push({
          mesh: cloud,
          angle: angle,
          radius: radius,
          y: y,
          speed: 0.0003 + Math.random() * 0.0005,
          phase: Math.random() * Math.PI * 2
        });
      }

      // ============================================================
      // 3. Tiles 渲染器
      // ============================================================
      let tilesRenderer = null;
      let tilesGroup = null;

      const defaultUrl =
        "https://z2586300277.github.io/3d-file-server/3dtiles/test/tileset.json";

      async function loadTileset(url) {
        if (!url) return;

        if (tilesGroup) {
          scene.remove(tilesGroup);
          tilesGroup = null;
        }
        if (tilesRenderer) {
          tilesRenderer.dispose();
          tilesRenderer = null;
        }

        try {
          tilesRenderer = new TilesRenderer(url);
          tilesRenderer.setCamera(camera);
          tilesRenderer.setResolutionFromRenderer(camera, renderer);

          tilesGroup = new THREE.Group();
          tilesGroup.add(tilesRenderer.group);
          scene.add(tilesGroup);

          const box3 = new THREE.Box3();
          tilesRenderer.addEventListener("load-tile-set", () => {
            if (tilesRenderer.getBoundingBox(box3)) {
              box3.getCenter(tilesRenderer.group.position);
              tilesRenderer.group.position.multiplyScalar(-1);
            }

            tilesRenderer.traverse((tile) => {
              if (tile.scene) {
                tile.scene.traverse((child) => {
                  if (child.isMesh && child.material) {
                    const materials = Array.isArray(child.material)
                      ? child.material
                      : [child.material];
                    materials.forEach((mat) => {
                      if (mat.isMeshBasicMaterial) {
                        const newMat = new THREE.MeshStandardMaterial({
                          color: mat.color,
                          map: mat.map,
                          roughness: 0.5,
                          metalness: 0.1,
                        });
                        if (Array.isArray(child.material)) {
                          child.material = child.material.map((m) =>
                            m === mat ? newMat : m
                          );
                        } else {
                          child.material = newMat;
                        }
                      }
                    });
                  }
                });
              }
            });
          });

          await tilesRenderer.update();
        } catch (error) {
          console.error("加载失败:", error);
        }
      }

      loadTileset(defaultUrl);

      // ============================================================
      // 4. 动画循环
      // ============================================================
      function animate() {
        requestAnimationFrame(animate);

        // 云朵飘动
        cloudPositions.forEach((cp) => {
          cp.angle += cp.speed * 0.5;
          const r = cp.radius + Math.sin(Date.now() * 0.0001 + cp.phase) * 5;
          cp.mesh.position.x = Math.cos(cp.angle) * r;
          cp.mesh.position.z = Math.sin(cp.angle) * r;
          cp.mesh.position.y = cp.y + Math.sin(Date.now() * 0.0003 + cp.phase) * 2;
        });

        if (tilesRenderer) {
          tilesRenderer.update();
        }

        controls.update();
        renderer.render(scene, camera);
      }
      animate();

      // ---------- 窗口自适应 ----------
      window.addEventListener("resize", () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        if (tilesRenderer) {
          tilesRenderer.setResolutionFromRenderer(camera, renderer);
        }
      });
    </script>

    <!-- 截图支持 -->
    <script>
      window.addEventListener("message", (e) => {
        if (e.data?.type === "take-screenshot") {
          try {
            const canvas = document.querySelector("canvas");
            if (canvas) {
              const temp = document.createElement("canvas");
              const scale = Math.min(600 / canvas.width, 600 / canvas.height);
              temp.width = canvas.width * scale;
              temp.height = canvas.height * scale;
              temp
                .getContext("2d")
                .drawImage(canvas, 0, 0, temp.width, temp.height);
              window.parent.postMessage(
                {
                  type: "screenshot-data",
                  dataUrl: temp.toDataURL("image/jpeg", e.data.quality || 0.8),
                },
                "*"
              );
            }
          } catch (err) {
            window.parent.postMessage(
              { type: "screenshot-error", error: err.message },
              "*"
            );
          }
        }
      });
    </script>
  </body>
</html>
