<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D Tiles - 蓝天白云背景</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        overflow: hidden;
        background: #1f1f1f;
      }
      #container {
        width: 100vw;
        height: 100vh;
      }
    </style>
  </head>
  <body>
    <div id="container"></div>

    <!-- 使用 CDN 引入 Three.js 及 3D Tiles 渲染器 -->
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.179.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.179.0/examples/jsm/",
          "3d-tiles-renderer": "https://cdn.jsdelivr.net/npm/3d-tiles-renderer@0.4.27/src/three/renderer/index.js",
          "3d-tiles-renderer/core": "https://cdn.jsdelivr.net/npm/3d-tiles-renderer@0.4.27/src/core/renderer/index.js"
        }
      }
    </script>

    <script type="module">
      import * as THREE from "three";
      import { OrbitControls } from "three/addons/controls/OrbitControls.js";
      import { TilesRenderer } from "3d-tiles-renderer";

      const container = document.getElementById("container");

      // ---------- 1. 生成蓝天白云背景纹理（Canvas绘制） ----------
      function createSkyTexture() {
        const canvas = document.createElement('canvas');
        canvas.width = 1024;
        canvas.height = 512;
        const ctx = canvas.getContext('2d');

        // 1) 天空渐变（从上到下：深蓝 -> 浅蓝 -> 淡蓝）
        const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
        grad.addColorStop(0, '#1a3a6a');
        grad.addColorStop(0.3, '#4a8fc5');
        grad.addColorStop(0.6, '#87CEEB');
        grad.addColorStop(0.85, '#b5dffa');
        grad.addColorStop(1, '#d4ecf7');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 2) 绘制云朵（多个椭圆组合）
        function drawCloud(cx, cy, scale, opacity) {
          ctx.save();
          ctx.globalAlpha = opacity;
          ctx.shadowColor = 'rgba(255,255,255,0.3)';
          ctx.shadowBlur = 20;
          ctx.fillStyle = 'rgba(255,255,255,0.9)';
          ctx.beginPath();
          // 主云团
          ctx.ellipse(cx, cy, 60 * scale, 30 * scale, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.beginPath();
          ctx.ellipse(cx - 50 * scale, cy + 10 * scale, 40 * scale, 25 * scale, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.beginPath();
          ctx.ellipse(cx + 50 * scale, cy + 8 * scale, 45 * scale, 28 * scale, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.beginPath();
          ctx.ellipse(cx - 20 * scale, cy - 15 * scale, 35 * scale, 25 * scale, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.beginPath();
          ctx.ellipse(cx + 20 * scale, cy - 18 * scale, 38 * scale, 26 * scale, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }

        // 随机分布云朵
        const clouds = [
          { cx: 100, cy: 80, scale: 1.2, opacity: 0.85 },
          { cx: 350, cy: 150, scale: 1.0, opacity: 0.75 },
          { cx: 600, cy: 60, scale: 1.4, opacity: 0.9 },
          { cx: 850, cy: 120, scale: 1.1, opacity: 0.8 },
          { cx: 200, cy: 220, scale: 0.9, opacity: 0.65 },
          { cx: 500, cy: 200, scale: 1.3, opacity: 0.7 },
          { cx: 750, cy: 230, scale: 1.0, opacity: 0.75 },
          { cx: 950, cy: 180, scale: 0.8, opacity: 0.6 },
          { cx: 50, cy: 300, scale: 1.1, opacity: 0.5 },
          { cx: 450, cy: 320, scale: 1.0, opacity: 0.55 },
          { cx: 700, cy: 350, scale: 1.2, opacity: 0.6 },
          { cx: 900, cy: 290, scale: 0.9, opacity: 0.5 },
        ];
        clouds.forEach(c => drawCloud(c.cx, c.cy, c.scale, c.opacity));

        // 额外加一些薄云（半透明）
        ctx.globalAlpha = 0.3;
        ctx.fillStyle = 'white';
        for (let i = 0; i < 30; i++) {
          const x = Math.random() * canvas.width;
          const y = Math.random() * canvas.height * 0.7;
          const w = 40 + Math.random() * 100;
          const h = 10 + Math.random() * 30;
          ctx.beginPath();
          ctx.ellipse(x, y, w, h, 0, 0, Math.PI * 2);
          ctx.fill();
        }

        const texture = new THREE.CanvasTexture(canvas);
        texture.magFilter = THREE.LinearFilter;
        texture.minFilter = THREE.LinearMipmapLinearFilter;
        return texture;
      }

      // ---------- 场景 ----------
      const scene = new THREE.Scene();
      // 使用生成的纹理作为背景
      scene.background = createSkyTexture();

      // ---------- 相机 ----------
      const camera = new THREE.PerspectiveCamera(
        75,
        window.innerWidth / window.innerHeight,
        0.1,
        10000
      );
      camera.position.set(0, 30, 30);

      // ---------- 渲染器 ----------
      const renderer = new THREE.WebGLRenderer({
        antialias: true,
        alpha: true,
        logarithmicDepthBuffer: true,
      });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      container.appendChild(renderer.domElement);

      // ---------- 控制器 ----------
      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;

      // ---------- 灯光 ----------
      scene.add(new THREE.AmbientLight(0xffffff, 0.6));
      const dirLight = new THREE.DirectionalLight(0xffffff, 1);
      dirLight.position.set(100, 200, 100);
      scene.add(dirLight);

      // ---------- Tiles 渲染器 ----------
      let tilesRenderer = null;
      let tilesGroup = null;

      const defaultUrl =
        "https://z2586300277.github.io/3d-file-server/3dtiles/test/tileset.json";

      async function loadTileset(url) {
        if (!url) return;

        if (tilesGroup) {
          scene.remove(tilesGroup);
          tilesGroup = null;
        }
        if (tilesRenderer) {
          tilesRenderer.dispose();
          tilesRenderer = null;
        }

        try {
          tilesRenderer = new TilesRenderer(url);
          tilesRenderer.setCamera(camera);
          tilesRenderer.setResolutionFromRenderer(camera, renderer);

          tilesGroup = new THREE.Group();
          tilesGroup.add(tilesRenderer.group);
          scene.add(tilesGroup);

          const box3 = new THREE.Box3();
          tilesRenderer.addEventListener("load-tile-set", () => {
            if (tilesRenderer.getBoundingBox(box3)) {
              box3.getCenter(tilesRenderer.group.position);
              tilesRenderer.group.position.multiplyScalar(-1);
            }

            tilesRenderer.traverse((tile) => {
              if (tile.scene) {
                tile.scene.traverse((child) => {
                  if (child.isMesh && child.material) {
                    const materials = Array.isArray(child.material)
                      ? child.material
                      : [child.material];
                    materials.forEach((mat) => {
                      if (mat.isMeshBasicMaterial) {
                        const newMat = new THREE.MeshStandardMaterial({
                          color: mat.color,
                          map: mat.map,
                          roughness: 0.5,
                          metalness: 0.1,
                        });
                        if (Array.isArray(child.material)) {
                          child.material = child.material.map((m) =>
                            m === mat ? newMat : m
                          );
                        } else {
                          child.material = newMat;
                        }
                      }
                    });
                  }
                });
              }
            });
          });

          await tilesRenderer.update();
        } catch (error) {
          console.error("加载失败:", error);
        }
      }

      loadTileset(defaultUrl);

      // ---------- 动画循环 ----------
      function animate() {
        requestAnimationFrame(animate);

        if (tilesRenderer) {
          tilesRenderer.update();
        }

        controls.update();
        renderer.render(scene, camera);
      }
      animate();

      // ---------- 窗口自适应 ----------
      window.addEventListener("resize", () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        if (tilesRenderer) {
          tilesRenderer.setResolutionFromRenderer(camera, renderer);
        }
      });
    </script>

    <!-- 截图支持 -->
    <script>
      window.addEventListener("message", (e) => {
        if (e.data?.type === "take-screenshot") {
          try {
            const canvas = document.querySelector("canvas");
            if (canvas) {
              const temp = document.createElement("canvas");
              const scale = Math.min(600 / canvas.width, 600 / canvas.height);
              temp.width = canvas.width * scale;
              temp.height = canvas.height * scale;
              temp
                .getContext("2d")
                .drawImage(canvas, 0, 0, temp.width, temp.height);
              window.parent.postMessage(
                {
                  type: "screenshot-data",
                  dataUrl: temp.toDataURL("image/jpeg", e.data.quality || 0.8),
                },
                "*"
              );
            }
          } catch (err) {
            window.parent.postMessage(
              { type: "screenshot-error", error: err.message },
              "*"
            );
          }
        }
      });
    </script>
  </body>
</html>
