<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>电子围栏 - 完整版</title>
    <style>
        * { margin: 0; padding: 0; }
        body { overflow: hidden; background: #87CEEB; font-family: Arial, sans-serif; }
        canvas { display: block; }

        .avatar-label {
            pointer-events: none;
            user-select: none;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 66px;
            height: 66px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.8);
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            background-color: #fff;
            overflow: hidden;
        }
        .avatar-label canvas {
            display: block;
            width: 100%;
            height: 100%;
            border-radius: 50%;
        }

        #toolbar {
            position: absolute;
            top: 10%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            display: flex;
            gap: 16px;
            background: rgba(0,0,0,0.6);
            padding: 10px 22px;
            border-radius: 40px;
            backdrop-filter: blur(6px);
            border: 1px solid rgba(255,255,255,0.15);
            pointer-events: auto;
        }
        #toolbar button {
            width: 52px;
            height: 52px;
            border: none;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 28px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }
        #toolbar button:hover {
            background: rgba(255,255,255,0.25);
        }
        #toolbar button:active {
            transform: scale(0.92);
        }
        #toolbar button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }
        #toolbar button.danger {
            background: rgba(200,60,60,0.6);
        }
        #toolbar button.danger:hover {
            background: rgba(200,60,60,0.9);
        }

        #status {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            color: #fff;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 16px;
            z-index: 100;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.1);
            pointer-events: none;
            white-space: nowrap;
            max-width: 80%;
            text-overflow: ellipsis;
            overflow: hidden;
        }
        #instructions {
            position: absolute;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.6);
            color: #fff;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 16px;
            z-index: 100;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
            backdrop-filter: blur(2px);
        }
        #instructions.show {
            opacity: 1;
        }

        #naming-panel {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 200;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            padding: 14px 24px;
            border-radius: 30px;
            display: none;
            align-items: center;
            gap: 12px;
            border: 1px solid rgba(255,255,255,0.2);
            pointer-events: auto;
        }
        #naming-panel.active {
            display: flex;
        }
        #naming-panel input {
            padding: 6px 14px;
            border: none;
            border-radius: 20px;
            font-size: 16px;
            width: 160px;
            background: rgba(255,255,255,0.15);
            color: #fff;
            outline: none;
        }
        #naming-panel input::placeholder {
            color: rgba(255,255,255,0.5);
        }
        #naming-panel button {
            padding: 6px 20px;
            border: none;
            border-radius: 20px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            background: #4a9ed6;
            color: #fff;
            transition: background 0.2s;
        }
        #naming-panel button:hover {
            background: #6bb8ee;
        }
        #naming-panel button.cancel {
            background: #666;
        }
        #naming-panel button.cancel:hover {
            background: #888;
        }

        .fence-label {
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(0,0,0,0.8), 0 0 5px rgba(0,0,0,0.6);
            background: rgba(0,0,0,0.5);
            padding: 2px 10px;
            border-radius: 12px;
            backdrop-filter: blur(2px);
            border: 1px solid rgba(255,255,255,0.2);
            pointer-events: none;
            user-select: none;
            white-space: nowrap;
        }
    </style>
</head>
<body>

<div id="toolbar">
    <button id="btnDraw" title="绘制围栏">✏️</button>
    <button id="btnClear" title="清除所有围栏" disabled>🗑️</button>
</div>
<div id="status">状态: 空闲 (围栏: 0)</div>
<div id="instructions">点击地面添加顶点 | Enter完成 | Escape取消</div>

<div id="naming-panel">
    <input id="fence-name-input" type="text" placeholder="输入围栏名称" maxlength="20" />
    <button id="confirm-name">确认</button>
    <button id="cancel-name" class="cancel">取消</button>
</div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.179.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.179.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

    // ----- 天空纹理 -----
    function createSkyTexture() {
        const canvas = document.createElement('canvas');
        canvas.width = 1024;
        canvas.height = 512;
        const ctx = canvas.getContext('2d');
        const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
        grad.addColorStop(0, '#1a5a9c');
        grad.addColorStop(0.25, '#4a9ed6');
        grad.addColorStop(0.5, '#7ec8e3');
        grad.addColorStop(0.75, '#b0dce8');
        grad.addColorStop(1, '#e0f0f5');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.globalAlpha = 0.08;
        for (let i = 0; i < 20; i++) {
            const x = Math.random() * canvas.width;
            const y = Math.random() * canvas.height * 0.6;
            const w = 80 + Math.random() * 200;
            const h = 20 + Math.random() * 40;
            const g = ctx.createRadialGradient(x, y, 0, x, y, w);
            g.addColorStop(0, 'rgba(255,255,255,1)');
            g.addColorStop(0.5, 'rgba(255,255,255,0.5)');
            g.addColorStop(1, 'rgba(255,255,255,0)');
            ctx.fillStyle = g;
            ctx.beginPath();
            ctx.ellipse(x, y, w, h, 0, 0, Math.PI * 2);
            ctx.fill();
        }
        const texture = new THREE.CanvasTexture(canvas);
        texture.magFilter = THREE.LinearFilter;
        texture.minFilter = THREE.LinearMipmapLinearFilter;
        return texture;
    }

    // ----- 水泥纹理 -----
    function createCementTexture() {
        const canvas = document.createElement('canvas');
        canvas.width = 512;
        canvas.height = 512;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#b8b8b8';
        ctx.fillRect(0, 0, 512, 512);
        for (let i = 0; i < 8000; i++) {
            const x = Math.random() * 512;
            const y = Math.random() * 512;
            const size = 1 + Math.random() * 3;
            const brightness = 120 + Math.random() * 80;
            ctx.fillStyle = `rgb(${brightness}, ${brightness}, ${brightness})`;
            ctx.fillRect(x, y, size, size);
        }
        for (let i = 0; i < 400; i++) {
            const x = Math.random() * 512;
            const y = Math.random() * 512;
            const size = 1 + Math.random() * 2;
            const dark = 60 + Math.random() * 60;
            ctx.fillStyle = `rgb(${dark}, ${dark}, ${dark})`;
            ctx.fillRect(x, y, size, size);
        }
        for (let i = 0; i < 200; i++) {
            const x = Math.random() * 512;
            const y = Math.random() * 512;
            const size = 1 + Math.random() * 2;
            const light = 200 + Math.random() * 55;
            ctx.fillStyle = `rgb(${light}, ${light}, ${light})`;
            ctx.fillRect(x, y, size, size);
        }
        ctx.strokeStyle = 'rgba(100,100,100,0.1)';
        ctx.lineWidth = 1;
        for (let i = 0; i < 30; i++) {
            const startX = Math.random() * 512;
            const startY = Math.random() * 512;
            ctx.beginPath();
            ctx.moveTo(startX, startY);
            for (let j = 0; j < 5; j++) {
                ctx.lineTo(startX + (Math.random() - 0.5) * 40, startY + (Math.random() - 0.5) * 40);
            }
            ctx.stroke();
        }
        const texture = new THREE.CanvasTexture(canvas);
        texture.wrapS = texture.wrapT = THREE.RepeatWrapping;
        texture.repeat.set(8, 8);
        texture.anisotropy = 4;
        return texture;
    }

    // ----- 头像图标 -----
    function createAvatarIcon(color, type) {
        const canvas = document.createElement('canvas');
        canvas.width = 80;
        canvas.height = 80;
        const ctx = canvas.getContext('2d');
        const bgColor = new THREE.Color(color);
        bgColor.offsetHSL(0, 0.1, 0.2);
        ctx.beginPath();
        ctx.arc(40, 40, 38, 0, Math.PI * 2);
        ctx.fillStyle = bgColor.getStyle();
        ctx.fill();
        ctx.strokeStyle = 'rgba(255,255,255,0.8)';
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.fillStyle = '#ffffff';
        ctx.shadowColor = 'rgba(0,0,0,0.2)';
        ctx.shadowBlur = 4;
        if (type === 'car') {
            ctx.fillStyle = '#ffffff';
            ctx.shadowBlur = 4;
            ctx.fillRect(18, 28, 44, 24);
            ctx.fillStyle = 'rgba(255,255,255,0.8)';
            ctx.fillRect(28, 22, 24, 10);
            ctx.fillStyle = '#333';
            ctx.shadowBlur = 0;
            ctx.beginPath();
            ctx.arc(22, 44, 6, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(58, 44, 6, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(22, 58, 6, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(58, 58, 6, 0, Math.PI * 2);
            ctx.fill();
        } else {
            ctx.shadowBlur = 4;
            ctx.beginPath();
            ctx.arc(40, 25, 12, 0, Math.PI * 2);
            ctx.fillStyle = '#ffffff';
            ctx.fill();
            ctx.fillRect(34, 37, 12, 20);
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(34, 42);
            ctx.lineTo(22, 52);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(46, 42);
            ctx.lineTo(58, 52);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(37, 57);
            ctx.lineTo(32, 70);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(43, 57);
            ctx.lineTo(48, 70);
            ctx.stroke();
        }
        return canvas;
    }

    // ----- 场景设置 -----
    const scene = new THREE.Scene();
    scene.background = createSkyTexture();
    scene.fog = new THREE.Fog(0xe0f0f5, 180, 300);

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 500);
    camera.position.set(40, 35, 50);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    document.body.appendChild(renderer.domElement);

    const labelRenderer = new CSS2DRenderer();
    labelRenderer.setSize(window.innerWidth, window.innerHeight);
    labelRenderer.domElement.style.position = 'absolute';
    labelRenderer.domElement.style.top = '0px';
    labelRenderer.domElement.style.left = '0px';
    labelRenderer.domElement.style.pointerEvents = 'none';
    document.body.appendChild(labelRenderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.target.set(0, 1, 0);
    controls.maxDistance = 200;
    controls.update();

    // ----- 灯光 -----
    const ambient = new THREE.AmbientLight(0x8899bb, 0.6);
    scene.add(ambient);
    const dirLight = new THREE.DirectionalLight(0xffeedd, 2.0);
    dirLight.position.set(30, 60, 30);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.width = 2048;
    dirLight.shadow.mapSize.height = 2048;
    const d = 80;
    dirLight.shadow.camera.left = -d;
    dirLight.shadow.camera.right = d;
    dirLight.shadow.camera.top = d;
    dirLight.shadow.camera.bottom = -d;
    dirLight.shadow.camera.near = 1;
    dirLight.shadow.camera.far = 120;
    scene.add(dirLight);
    const fillLight = new THREE.DirectionalLight(0x88aaff, 0.5);
    fillLight.position.set(-30, 15, -30);
    scene.add(fillLight);
    const backLight = new THREE.DirectionalLight(0xffccaa, 0.3);
    backLight.position.set(-20, 10, 40);
    scene.add(backLight);

    // ----- 地面 -----
    const cementTexture = createCementTexture();
    const groundMat = new THREE.MeshStandardMaterial({
        map: cementTexture,
        roughness: 0.9,
        metalness: 0.0,
        color: 0xcccccc,
    });
    const groundSize = 300;
    const ground = new THREE.Mesh(new THREE.PlaneGeometry(groundSize, groundSize), groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -0.01;
    ground.receiveShadow = true;
    ground.name = 'ground';
    scene.add(ground);

    // ----- 创建车辆和行人 -----
    function createCar(color = 0x4488ff) {
        const group = new THREE.Group();
        const scale = 3.0;
        const bodyMat = new THREE.MeshStandardMaterial({ color, roughness: 0.5, metalness: 0.2 });
        const body = new THREE.Mesh(new THREE.BoxGeometry(1.2 * scale, 0.4 * scale, 0.8 * scale), bodyMat);
        body.position.y = 0.3 * scale;
        body.castShadow = true;
        body.receiveShadow = true;
        group.add(body);
        const roofMat = new THREE.MeshStandardMaterial({ color: 0xccccdd, roughness: 0.6 });
        const roof = new THREE.Mesh(new THREE.BoxGeometry(0.6 * scale, 0.3 * scale, 0.5 * scale), roofMat);
        roof.position.set(0, 0.6 * scale, 0);
        roof.castShadow = true;
        roof.receiveShadow = true;
        group.add(roof);
        const wheelMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.8 });
        const wheelPos = [
            [-0.5 * scale, 0.1 * scale, -0.5 * scale],
            [0.5 * scale, 0.1 * scale, -0.5 * scale],
            [-0.5 * scale, 0.1 * scale, 0.5 * scale],
            [0.5 * scale, 0.1 * scale, 0.5 * scale]
        ];
        wheelPos.forEach(pos => {
            const wheel = new THREE.Mesh(new THREE.CylinderGeometry(0.15 * scale, 0.15 * scale, 0.08 * scale, 8), wheelMat);
            wheel.rotation.z = Math.PI / 2;
            wheel.position.set(pos[0], 0.1 * scale, pos[1]);
            wheel.castShadow = true;
            wheel.receiveShadow = true;
            group.add(wheel);
        });
        const lightMat = new THREE.MeshStandardMaterial({ color: 0xffffaa, emissive: 0xffffaa, emissiveIntensity: 0.3 });
        const light1 = new THREE.Mesh(new THREE.SphereGeometry(0.05 * scale, 6, 6), lightMat);
        light1.position.set(0.6 * scale, 0.3 * scale, -0.25 * scale);
        group.add(light1);
        const light2 = new THREE.Mesh(new THREE.SphereGeometry(0.05 * scale, 6, 6), lightMat);
        light2.position.set(0.6 * scale, 0.3 * scale, 0.25 * scale);
        group.add(light2);
        const avatarCanvas = createAvatarIcon(color, 'car');
        const div = document.createElement('div');
        div.className = 'avatar-label';
        div.appendChild(avatarCanvas);
        const label = new CSS2DObject(div);
        label.position.set(0, (1.2 * scale + 0.8) * 1.5, 0);
        group.add(label);
        return group;
    }

    function createPerson(color = 0xffaa44) {
        const group = new THREE.Group();
        const scale = 3.0;
        const bodyMat = new THREE.MeshStandardMaterial({ color, roughness: 0.6 });
        const body = new THREE.Mesh(new THREE.CylinderGeometry(0.25 * scale, 0.25 * scale, 0.6 * scale, 6), bodyMat);
        body.position.y = 0.4 * scale;
        body.castShadow = true;
        body.receiveShadow = true;
        group.add(body);
        const headMat = new THREE.MeshStandardMaterial({ color: 0xffddbb, roughness: 0.5 });
        const head = new THREE.Mesh(new THREE.SphereGeometry(0.18 * scale, 8, 8), headMat);
        head.position.set(0, 0.8 * scale, 0);
        head.castShadow = true;
        head.receiveShadow = true;
        group.add(head);
        const legMat = new THREE.MeshStandardMaterial({ color: 0x445566, roughness: 0.7 });
        const legPos = [
            [-0.1 * scale, 0.1 * scale, 0],
            [0.1 * scale, 0.1 * scale, 0]
        ];
        legPos.forEach(pos => {
            const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.06 * scale, 0.06 * scale, 0.2 * scale, 6), legMat);
            leg.position.set(pos[0], 0.1 * scale, pos[1]);
            leg.castShadow = true;
            leg.receiveShadow = true;
            group.add(leg);
        });
        const armMat = new THREE.MeshStandardMaterial({ color: 0xffddbb, roughness: 0.5 });
        const armPos = [
            [-0.3 * scale, 0.5 * scale, 0],
            [0.3 * scale, 0.5 * scale, 0]
        ];
        armPos.forEach(pos => {
            const arm = new THREE.Mesh(new THREE.CylinderGeometry(0.04 * scale, 0.04 * scale, 0.3 * scale, 6), armMat);
            arm.position.set(pos[0], 0.5 * scale, pos[1]);
            arm.rotation.z = pos[0] > 0 ? -0.3 : 0.3;
            arm.castShadow = true;
            arm.receiveShadow = true;
            group.add(arm);
        });
        const avatarCanvas = createAvatarIcon(color, 'person');
        const div = document.createElement('div');
        div.className = 'avatar-label';
        div.appendChild(avatarCanvas);
        const label = new CSS2DObject(div);
        label.position.set(0, (1.2 * scale + 0.8) * 1.5, 0);
        group.add(label);
        return group;
    }

    // ----- 生成随机实体 -----
    const entities = [];
    const boundary = 140;
    const speedBase = 0.035;
    const carColors = [
        0x4488ff, 0xff6644, 0x44dd88, 0xffaa33, 0xcc66ff, 0xff44aa, 0x66ccff,
        0xffaa44, 0x88ddff, 0xaa88ff, 0xff8866, 0x44ffaa, 0x66aaff, 0xff66cc, 0x88ff66
    ];
    for (let i = 0; i < 15; i++) {
        const car = createCar(carColors[i % carColors.length]);
        const x = (Math.random() - 0.5) * 240;
        const z = (Math.random() - 0.5) * 240;
        car.position.set(x, 0, z);
        const angle = Math.random() * Math.PI * 2;
        car.rotation.y = angle;
        scene.add(car);
        entities.push({
            mesh: car,
            angle: angle,
            speed: speedBase * (0.7 + Math.random() * 0.6),
            turnTimer: 0,
            turnInterval: 100 + Math.random() * 200,
            type: 'car'
        });
    }
    const personColors = [
        0xff8844, 0x44ddff, 0xff66aa, 0x88ff44, 0xffaa88, 0xaa88ff, 0x66ff99,
        0xff9966, 0x66ddff, 0xff77bb, 0x99ff66, 0xcc88ff, 0x88ffcc, 0xffaa66, 0x66ccff,
        0xff66bb, 0x88ff88, 0xaa88dd, 0xffbb88, 0x44ffdd
    ];
    for (let i = 0; i < 25; i++) {
        const person = createPerson(personColors[i % personColors.length]);
        const x = (Math.random() - 0.5) * 240;
        const z = (Math.random() - 0.5) * 240;
        person.position.set(x, 0, z);
        const angle = Math.random() * Math.PI * 2;
        person.rotation.y = angle;
        scene.add(person);
        entities.push({
            mesh: person,
            angle: angle,
            speed: speedBase * (0.5 + Math.random() * 0.7),
            turnTimer: 0,
            turnInterval: 80 + Math.random() * 150,
            type: 'person'
        });
    }

    // ----- 围栏管理 -----
    const fences = [];
    let drawMode = false;
    let currentVertices = [];
    let drawLine = null;
    let pendingVertices = null;

    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();

    const btnDraw = document.getElementById('btnDraw');
    const btnClear = document.getElementById('btnClear');
    const statusEl = document.getElementById('status');
    const instructions = document.getElementById('instructions');
    const namingPanel = document.getElementById('naming-panel');
    const nameInput = document.getElementById('fence-name-input');
    const confirmBtn = document.getElementById('confirm-name');
    const cancelBtn = document.getElementById('cancel-name');

    function pointInPolygon(px, pz, polygon) {
        let inside = false;
        const n = polygon.length;
        if (n < 3) return false;
        for (let i = 0, j = n - 1; i < n; j = i++) {
            const xi = polygon[i].x, zi = polygon[i].z;
            const xj = polygon[j].x, zj = polygon[j].z;
            const intersect = ((zi > pz) !== (zj > pz)) &&
                (px < (xj - xi) * (pz - zi) / (zj - zi) + xi);
            if (intersect) inside = !inside;
        }
        return inside;
    }

    function clearDrawLine() {
        if (drawLine) {
            scene.remove(drawLine);
            drawLine.geometry.dispose();
            drawLine.material.dispose();
            drawLine = null;
        }
    }

    function updateDrawLine() {
        clearDrawLine();
        if (currentVertices.length < 2) return;
        const points = currentVertices.map(v => new THREE.Vector3(v.x, 0.05, v.z));
        const geometry = new THREE.BufferGeometry().setFromPoints(points);
        const material = new THREE.LineBasicMaterial({ color: 0xffaa44 });
        drawLine = new THREE.Line(geometry, material);
        scene.add(drawLine);
    }

    function buildPolygon(verts) {
        if (verts.length < 3) return null;
        const points = verts.map(v => new THREE.Vector2(v.x, v.z));
        let triIndices;
        try {
            triIndices = THREE.ShapeUtils.triangulateShape(points, []);
        } catch (e) {
            console.error('三角剖分失败:', e);
            return null;
        }
        const flatIndices = [];
        for (const tri of triIndices) {
            flatIndices.push(tri[0], tri[1], tri[2]);
        }
        const geometry = new THREE.BufferGeometry();
        const positions = [];
        for (const v of verts) {
            positions.push(v.x, 0, v.z);
        }
        geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
        geometry.setIndex(flatIndices);
        geometry.computeVertexNormals();
        return geometry;
    }

    function createFence(vertices, name) {
        try {
            const geom = buildPolygon(vertices);
            if (!geom) throw new Error('几何体生成失败');
            const material = new THREE.MeshBasicMaterial({
                color: 0x00ff00,
                transparent: true,
                opacity: 0.3,
                side: THREE.DoubleSide,
                depthWrite: false,
            });
            const mesh = new THREE.Mesh(geom, material);
            mesh.position.y = 0.02;
            mesh.renderOrder = 1;
            scene.add(mesh);
            const borderPoints = vertices.map(v => new THREE.Vector3(v.x, 0.03, v.z));
            borderPoints.push(borderPoints[0]);
            const borderGeo = new THREE.BufferGeometry().setFromPoints(borderPoints);
            const borderMat = new THREE.LineBasicMaterial({ color: 0x00ff00 });
            const border = new THREE.Line(borderGeo, borderMat);
            border.renderOrder = 2;
            scene.add(border);
            const center = new THREE.Vector3();
            for (const v of vertices) center.add(v);
            center.divideScalar(vertices.length);
            const div = document.createElement('div');
            div.className = 'fence-label';
            div.textContent = name;
            const label = new CSS2DObject(div);
            label.position.set(center.x, 0.5, center.z);
            scene.add(label);
            const fenceObj = {
                name: name,
                vertices: vertices,
                mesh: mesh,
                border: border,
                label: label,
                alert: false
            };
            fences.push(fenceObj);
            console.log(`✅ 围栏 "${name}" 创建成功，当前共 ${fences.length} 个`);
            return fenceObj;
        } catch (err) {
            console.error('创建围栏失败:', err);
            alert('创建围栏失败: ' + err.message);
            return null;
        }
    }

    function finishDrawing() {
        if (currentVertices.length < 3) {
            statusEl.innerHTML = '状态: 至少需要3个顶点';
            return;
        }
        clearDrawLine();
        exitDrawMode();
        pendingVertices = currentVertices.slice();
        currentVertices = [];
        namingPanel.classList.add('active');
        nameInput.value = '围栏' + (fences.length + 1);
        nameInput.focus();
        nameInput.select();
        statusEl.innerHTML = '状态: 请输入围栏名称并确认';
    }

    function confirmFenceName() {
        const name = nameInput.value.trim() || ('围栏' + (fences.length + 1));
        if (pendingVertices && pendingVertices.length >= 3) {
            const fence = createFence(pendingVertices, name);
            pendingVertices = null;
            if (fence) {
                btnClear.disabled = false;
                statusEl.innerHTML = `状态: 围栏 "${name}" 已建立 (共${fences.length}个)`;
                updateStatus();
            } else {
                statusEl.innerHTML = '状态: 创建围栏失败';
            }
        }
        namingPanel.classList.remove('active');
        nameInput.value = '';
    }

    function cancelFenceName() {
        pendingVertices = null;
        namingPanel.classList.remove('active');
        nameInput.value = '';
        statusEl.innerHTML = '状态: 已取消命名，围栏未保存';
    }

    function cancelDraw() {
        clearDrawLine();
        currentVertices = [];
        exitDrawMode();
        statusEl.innerHTML = '状态: 已取消绘制';
    }

    function exitDrawMode() {
        drawMode = false;
        controls.enabled = true;
        btnDraw.textContent = '✏️';
        btnDraw.classList.remove('danger');
        instructions.classList.remove('show');
    }

    function clearAllFences() {
        for (const fence of fences) {
            scene.remove(fence.mesh);
            fence.mesh.geometry.dispose();
            fence.mesh.material.dispose();
            scene.remove(fence.border);
            fence.border.geometry.dispose();
            fence.border.material.dispose();
            scene.remove(fence.label);
        }
        fences.length = 0;
        clearDrawLine();
        currentVertices = [];
        pendingVertices = null;
        btnClear.disabled = true;
        statusEl.innerHTML = '状态: 所有围栏已清除';
        updateStatus();
        namingPanel.classList.remove('active');
        nameInput.value = '';
    }

    function updateStatus() {
        const count = fences.length;
        let alertNames = fences.filter(f => f.alert).map(f => f.name);
        let alertText = alertNames.length ? ' 🚨 入侵: ' + alertNames.join(', ') : '';
        statusEl.innerHTML = `状态: 围栏 ${count} 个${alertText}`;
    }

    // ----- 事件绑定 -----
    function onPointerDown(event) {
        if (!drawMode) return;
        pointer.x = (event.clientX / window.innerWidth) * 2 - 1;
        pointer.y = -(event.clientY / window.innerHeight) * 2 + 1;
        raycaster.setFromCamera(pointer, camera);
        const intersect = raycaster.intersectObject(ground);
        if (intersect.length > 0 && intersect[0].object === ground) {
            const point = intersect[0].point;
            if (Math.abs(point.x) < 145 && Math.abs(point.z) < 145) {
                currentVertices.push(new THREE.Vector3(point.x, 0, point.z));
                updateDrawLine();
                statusEl.innerHTML = `状态: 绘制中 (顶点: ${currentVertices.length})`;
            }
        }
    }

    function onKeyDown(event) {
        if (event.key === 'Enter' && drawMode && currentVertices.length >= 3) {
            event.preventDefault();
            finishDrawing();
        } else if (event.key === 'Escape' && drawMode) {
            event.preventDefault();
            cancelDraw();
        } else if (event.key === 'Escape' && namingPanel.classList.contains('active')) {
            cancelFenceName();
        } else if (event.key === 'Enter' && namingPanel.classList.contains('active')) {
            event.preventDefault();
            confirmFenceName();
        }
    }

    btnDraw.addEventListener('click', () => {
        if (drawMode) {
            cancelDraw();
        } else {
            drawMode = true;
            controls.enabled = false;
            btnDraw.textContent = '✖️';
            btnDraw.classList.add('danger');
            instructions.classList.add('show');
            statusEl.innerHTML = '状态: 绘制中... 点击地面添加顶点';
            clearDrawLine();
            currentVertices = [];
            if (namingPanel.classList.contains('active')) {
                cancelFenceName();
            }
        }
    });

    btnClear.addEventListener('click', () => {
        clearAllFences();
    });

    confirmBtn.addEventListener('click', confirmFenceName);
    cancelBtn.addEventListener('click', cancelFenceName);

    document.addEventListener('pointerdown', onPointerDown);
    document.addEventListener('keydown', onKeyDown);

    // ----- 更新实体和围栏 -----
    function updateEntities() {
        const time = Date.now();
        entities.forEach(ent => {
            ent.turnTimer++;
            if (ent.turnTimer > ent.turnInterval) {
                ent.turnTimer = 0;
                ent.turnInterval = 100 + Math.random() * 200;
                const delta = (Math.random() - 0.5) * 2.0;
                ent.angle += delta;
            }
            const dx = Math.sin(ent.angle) * ent.speed;
            const dz = Math.cos(ent.angle) * ent.speed;
            let newX = ent.mesh.position.x + dx;
            let newZ = ent.mesh.position.z + dz;
            if (newX > boundary) { newX = boundary; ent.angle = Math.PI - ent.angle + (Math.random() - 0.5) * 0.5; }
            if (newX < -boundary) { newX = -boundary; ent.angle = Math.PI - ent.angle + (Math.random() - 0.5) * 0.5; }
            if (newZ > boundary) { newZ = boundary; ent.angle = -ent.angle + (Math.random() - 0.5) * 0.5; }
            if (newZ < -boundary) { newZ = -boundary; ent.angle = -ent.angle + (Math.random() - 0.5) * 0.5; }
            ent.mesh.position.set(newX, 0, newZ);
            ent.mesh.rotation.y = ent.angle;
            if (ent.type === 'person') {
                const bob = Math.sin(time * 0.005 + ent.mesh.id) * 0.05;
                ent.mesh.position.y = bob;
            }
        });
    }

    function updateFences() {
        for (const fence of fences) fence.alert = false;
        for (const ent of entities) {
            const pos = ent.mesh.position;
            for (const fence of fences) {
                if (pointInPolygon(pos.x, pos.z, fence.vertices)) {
                    fence.alert = true;
                }
            }
        }
        for (const fence of fences) {
            const material = fence.mesh.material;
            if (fence.alert) {
                const intensity = 0.5 + 0.5 * Math.sin(Date.now() * 0.008);
                material.color.setHex(0xff0000);
                material.opacity = 0.3 + 0.5 * intensity;
                fence.border.material.color.setHex(0xff0000);
            } else {
                material.color.setHex(0x00ff00);
                material.opacity = 0.3;
                fence.border.material.color.setHex(0x00ff00);
            }
        }
        updateStatus();
    }

    // ----- 动画循环 -----
    function animate() {
        requestAnimationFrame(animate);
        updateEntities();
        updateFences();
        controls.update();
        renderer.render(scene, camera);
        labelRenderer.render(scene, camera);
    }
    animate();

    // ----- 窗口自适应 -----
    window.addEventListener('resize', () => {
        const w = window.innerWidth;
        const h = window.innerHeight;
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
        renderer.setSize(w, h);
        labelRenderer.setSize(w, h);
    });

    console.log('✅ 完整版电子围栏已加载');
</script>
</body>
